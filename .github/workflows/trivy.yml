name: Security Scan

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch: {}

jobs:
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v6

    - name: Run Trivy IaC scanner (Terraform)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        scan-ref: './terraform'
        format: 'sarif'
        output: 'trivy-iac-results.sarif'
        exit-code: '1' 
        severity: 'CRITICAL,HIGH'

    # 2. Reszta Twoich kroków (Maven + Docker)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build with Maven
      run: cd app && mvn clean package -DskipTests

    - name: Run Trivy vulnerability scanner (Filesystem - App)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './app'
        format: 'sarif'
        output: 'trivy-fs-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Build Docker image
      run: docker build -t my-app:${{ github.sha }} ./app

    - name: Run Trivy vulnerability scanner (Image)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'my-app:${{ github.sha }}'
        format: 'sarif'
        output: 'trivy-image-results.sarif'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy IaC results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-iac-results.sarif'
        category: 'infrastructure'

    - name: Upload Trivy FS results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-fs-results.sarif'
        category: 'filesystem'

    - name: Upload Trivy Image results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-image-results.sarif'
        category: 'docker-image'