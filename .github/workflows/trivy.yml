name: Security Scan

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Application (Required for deep FS scan)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - run: cd app && mvn clean package -DskipTests


    - name: Run Trivy Comprehensive Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'rootfs'
        scan-ref: '.'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    # Jeśli jednak chcesz SARIF do zakładki Security (bez dublowania skanu w logach):
    - name: Generate SARIF Report
      uses: aquasecurity/trivy-action@master
      if: always()
      with:
        scan-type: 'rootfs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '1'

    - name: Upload results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'