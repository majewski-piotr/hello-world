name: "Terraform Infrastructure"

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      action:
        description: 'choose Terraform action to perform'
        required: true
        default: 'apply'
        type: choice
        options: [apply, destroy]

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Conftest
        run: |
          LATEST=$(curl -s https://api.github.com/repos/open-policy-agent/conftest/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          curl -L -o conftest.tar.gz "https://github.com/open-policy-agent/conftest/releases/download/v${LATEST}/conftest_${LATEST}_Linux_x86_64.tar.gz"
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::195275673810:role/Terraform
          aws-region: eu-central-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Plan
        id: plan
        run: |
          # Używamy -chdir, aby wejść do folderu terraform
          terraform -chdir=terraform plan -input=false -out=tfplan ${{ github.event.inputs.action == 'destroy' && '-destroy' || '' }}
          terraform -chdir=terraform show -json tfplan > terraform/tfplan.json

      - name: Conftest Static Analysis
        run: |
          # Ścieżka do planu: terraform/tfplan.json
          # Ścieżka do polityk: policy (w root)
          conftest test terraform/tfplan.json --policy policy/terraform

      - name: Terraform Apply
        if: >
          ((github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')) &&
          success()
        run: terraform -chdir=terraform apply -auto-approve -input=false tfplan