version: 2
updates:
  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "weekly"
    groups:
      providers:
        patterns:
          - "hashicorp/aws"
      modules:
        patterns:
          - "*"

  - package-ecosystem: "maven"
    directory: "/app"
    schedule:
      interval: "weekly"
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
      testing:
        patterns:
          - "*test*"
          - "*junit*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/app"
    schedule:
      interval: "weekly"